<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&amp;family=Jost:wght@200&amp;display=swap');
    </style>
  </defs>

  <!-- Background fill -->
  <circle cx="100" cy="100" r="98" fill="#1e1a14"/>

  <!-- Single clean outer border -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#c4a882" stroke-width="0.7" opacity="0.8"/>

  <!-- Minimal botanical — one sprig each side -->
  <g opacity="0.6">
    <!-- Left sprig -->
    <line x1="48" y1="110" x2="68" y2="88" stroke="#c4a882" stroke-width="0.8"/>
    <ellipse cx="54" cy="103" rx="5.5" ry="2.2" transform="rotate(-42 54 103)" fill="#7a8467" opacity="0.8"/>
    <ellipse cx="62" cy="96" rx="5" ry="2" transform="rotate(-48 62 96)" fill="#7a8467" opacity="0.65"/>
    <!-- Right sprig (mirrored) -->
    <line x1="152" y1="110" x2="132" y2="88" stroke="#c4a882" stroke-width="0.8"/>
    <ellipse cx="146" cy="103" rx="5.5" ry="2.2" transform="rotate(42 146 103)" fill="#7a8467" opacity="0.8"/>
    <ellipse cx="138" cy="96" rx="5" ry="2" transform="rotate(48 138 96)" fill="#7a8467" opacity="0.65"/>
  </g>

  <!-- Thin rule lines -->
  <line x1="42" y1="107" x2="72" y2="107" stroke="#c4a882" stroke-width="0.4" opacity="0.4"/>
  <line x1="128" y1="107" x2="158" y2="107" stroke="#c4a882" stroke-width="0.4" opacity="0.4"/>

  <!-- Main name -->
  <text x="100" y="108"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="30"
    font-weight="300"
    font-style="italic"
    fill="#f5f0e6"
    text-anchor="middle"
    letter-spacing="2">Nisrine</text>

  <!-- Subtitle -->
  <text x="100" y="122"
    font-family="'Jost', sans-serif"
    font-size="6"
    font-weight="200"
    fill="#c4a882"
    text-anchor="middle"
    letter-spacing="5">WEB DESIGN</text>

</svg>
